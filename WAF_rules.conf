#  Rules for SQLi Protection
# Basic rules to test against SQL injection

# Block common SQL keywords in suspicious patterns
SecRule ARGS "@rx (?:union|select|insert|update|delete|drop|create|alter)" \
    "id:1001,phase:2,deny,status:403,msg:'SQL Keyword Detected'"

# Block SQL comments
SecRule ARGS "@rx (--|;|/\*|\*/|xp_|sp_)" \
    "id:1002,phase:2,deny,status:403,msg:'SQL Comment/Procedure Detected'"

# Block quotes and SQL operators
SecRule ARGS "@rx '[\s]*(and|or|union)" \
    "id:1003,phase:2,deny,status:403,msg:'SQLi Pattern Detected'"

# Block SLEEP and BENCHMARK functions (blind SQLi)
SecRule ARGS "@rx (sleep|benchmark|waitfor)" \
    "id:1004,phase:2,deny,status:403,msg:'Time-based SQLi Detected'"
